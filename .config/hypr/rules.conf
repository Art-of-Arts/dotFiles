# ~/.config/hypr/rules.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
# See https://wiki.hyprland.org/Configuring/Workspace-Rules/ for workspace rules

# Ignore maximize requests from apps. You'll probably like this.
# windowrule = suppressevent maximize, match:class .*

# Fix some dragging issues with XWayland
# windowrule = nofocus,match:class ^$,match:title ^$,xwayland:1,floating:1,fullscreen:0,pinned:0



windowrule = workspace special:distify, match:class spotify
windowrule = workspace special:distify, match:class vesktop

windowrule { # kando rules :3
  name = kando
  match:class = ^(kando)$

  no_blur = on
  opaque = on
  size = 100% 100%
  border_size = 0
  no_anim = on
  float = on
  pin = on
}

windowrule { # makes zenity show up everywhere!
  name = zenity
  match:class = ^(zenity)$

  pin = on

}

# gromit-mpx rules
# workspace = special:GROMIT, dim_special:0, gapsin:0, gapsout:0, on-created-empty: gromit-mpx -a # commenting out because i'm setting grommit-mpx to be omni-present
# windowrule = workspace special:GROMIT, match:class ^(Grommit-mpx)$
windowrule {
  name = grommit-mpx
  match:class = ^(Grommit-mpx)$
  no_blur = on
  opacity = 1 # override, match:1 override
  no_shadow = on
  fullscreen = match:1
  size = 100% 100%
  pin = on
  float = on
#  no_input = on
  no_focus = on
}

# bongo cat rules
windowrule = no_blur on, match:title ^(BongoCat)$
windowrule = opacity 0.7 0.7 override, match:title ^(BongoCat)$
windowrule = no_shadow on, match:title ^(BongoCat)$
windowrule = pin on, match:title ^(BongoCat)$
windowrule = no_anim on, match:class ^(BongoCat)$
windowrule = float on, match:class ^(BongoCat)$
windowrule = border_size 0, match:class ^(BongoCat)$

# window & workspace rules for bitwarden
windowrule {
  name = bitwarden
  match:class = Bitwarden

  workspace = special:bitwarden
  opacity = 0.6 0.2 override
  no_shadow = on
  no_anim = on
}
# workspace = special:bitwarden, shadow:false
