# ~/.config/hypr/autostart.conf

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

# applications
exec-once = spotify-launcher
exec-once = bitwarden-desktop
exec-once = dev.vencord.Vesktop
exec-once = [workspace 5 silent] steam
exec-once = [workspace 3 silent] obsidian
exec-once = [workspace 2 silent] zen-browser
exec-once = [workspace 2 silent] app.zen_browser.app
# exec-once = ghostty --command='tmux a -tTmuxtty || tmux new -sTmuxtty' --title='Tmuxtty' --class='tmuxtty' &

# tools
exec-once = kando
exec-once = swaync
exec-once = hypridle
exec-once = hyprsunset
exec-once = kdeconnect-indicator
exec-once = "/opt/Mullvad VPN/mullvad-gui"
exec-once = while true; do waybar; notify-send 'waybar crashed? restarting' -e; done

# background processes
exec-once = nm-applet
exec-once = swww-daemon
exec-once = batsignal -c 5 -w 20
exec-once = wl-paste --watch cliphist store
exec-once = systemctl --user start swww-hyprlock-bgsync.timer
exec-once = while true; do gcalcli remind; sleep 1800; done
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP

# exec-once = waybar & hyprpaper & firefox
# env and env accesories

# settings the desktop and desktop type variables
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# theming
env = GTK_THEME,rose-pine-gtk
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_QPA_PLATFORMTHEME,qt5ct

env = XCURSOR_THEME,Kirispica
env = XCURSOR_SIZE,24

# makes electron apps run in wayland mode instead of xwayland ( kando specific )
env = ELECTRON_OZONE_PLATFORM_HINT,auto
env = GTK_USE_PORTAL,1

env = GBM_BACKEND,nvidia-drm
env = __GLX_VENDOR_LIBRARY_NAME,nvidia
env = LIBVA_DRIVER_NAME,nvidia
